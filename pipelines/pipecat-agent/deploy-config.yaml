# Deployment configuration for the Pipecat managed A/V agent.
# cloudrun-deploy.py reads this file to determine how to rebuild and
# redeploy the agent image when the source directory changes.
agent_name: phone-danbot-agent
image_repository: us-central1-docker.pkg.dev/phone-danbot1/phone-danbot1/danbot-phone
image_credentials: gcp-artifact-pull
secret_set: phone-danbot-secrets
agent_profile: agent-1x
min_agents: 0
max_agents: 1
enable_krisp: false
enable_managed_keys: false
organization: danshapiro
docker_extra_args:
  - --platform
  - linux/arm64
